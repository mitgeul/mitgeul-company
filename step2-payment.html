<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP 2 결제 — 믿글컴퍼니</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
      background: #f9f9f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid #ebebeb;
    }
    .label {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .desc {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    /* 상담 확인 배너 */
    .consult-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #f4f4f2;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 28px;
    }
    .consult-banner-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1a1a1a;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .consult-banner p {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }

    /* 포함 내용 */
    .includes {
      font-size: 13px;
      color: #555;
      line-height: 2;
      margin-bottom: 28px;
    }
    .includes li {
      list-style: none;
      display: flex;
      gap: 8px;
    }
    .includes li::before { content: "—"; color: #bbb; }

    /* 금액 */
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 20px;
      padding: 16px;
      background: #f9f9f7;
      border-radius: 10px;
      justify-content: space-between;
    }
    .price-label { font-size: 13px; color: #888; }
    .price-right { display: flex; align-items: baseline; gap: 6px; }
    .price { font-size: 26px; font-weight: 500; color: #1a1a1a; }
    .price-unit { font-size: 14px; color: #888; }

    /* 고객명 입력 */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field input:focus { border-color: #1a1a1a; }
    .field input::placeholder { color: #bbb; }

    #pay-btn {
      width: 100%;
      padding: 15px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #pay-btn:hover { background: #333; }
    #pay-btn:disabled { background: #aaa; cursor: not-allowed; }
    .notice {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">MITGEUL · STEP 2</p>
    <h1>기준 설계 (집중 10일)</h1>
    <p class="desc">
      대표님의 사업 판단 기준을 생각이 아니라<br>구조로 정리하는 과정입니다.
    </p>

    <div class="consult-banner">
      <div class="consult-banner-dot"></div>
      <p>상담을 통해 확정된 분께 발송된 결제 링크입니다.<br>상담 없이 바로 신청을 원하시면 카카오톡 채널로 문의해주세요.</p>
    </div>

    <ul class="includes">
      <li>집중 10일 · 1:1 비대면</li>
      <li>믿글 사고법 PDF</li>
      <li>기준 설계 워크북</li>
      <li>1:1 비대면 소통 3회 (각 30분)</li>
      <li>기준 문서 제공</li>
      <li>STEP 1 포함</li>
    </ul>

    <div class="price-row">
      <span class="price-label">결제 금액</span>
      <div class="price-right">
        <span class="price">1,100,000원</span>
        <span class="price-unit">· 부가세 포함</span>
      </div>
    </div>

    <div class="field">
      <label for="customer-name">성함</label>
      <input type="text" id="customer-name" placeholder="홍길동" />
    </div>

    <button id="pay-btn">결제하기</button>
    <p class="notice">
      결제 완료 후 카카오톡으로 온보딩 안내를 드립니다.
    </p>
  </div>

  <script src="https://js.tosspayments.com/v2/standard"></script>
  <script>
    const CLIENT_KEY = "test_ck_여기에_클라이언트키_입력";
    const tossPayments = TossPayments(CLIENT_KEY);

    const btn = document.getElementById("pay-btn");

    btn.addEventListener("click", async () => {
      const customerName = document.getElementById("customer-name").value.trim();
      if (!customerName) {
        document.getElementById("customer-name").focus();
        document.getElementById("customer-name").style.borderColor = "#e24b4a";
        return;
      }

      btn.disabled = true;
      btn.textContent = "결제창 여는 중...";

      const orderId = "STEP2-" + Date.now();

      try {
        await tossPayments.requestPayment({
          method: "CARD",
          amount: { currency: "KRW", value: 1100000 },
          orderId: orderId,
          orderName: "믿글 STEP 2 · 기준 설계 (집중 10일)",
          customerName: customerName,
          successUrl: window.location.origin + "/step2-success.html?orderId=" + orderId + "&name=" + encodeURIComponent(customerName),
          failUrl:    window.location.origin + "/step2-payment.html?fail=1",
        });
      } catch (e) {
        console.error(e);
        btn.disabled = false;
        btn.textContent = "결제하기";
        if (e.code !== "USER_CANCEL") {
          alert("결제 중 오류가 발생했습니다. 다시 시도해주세요.");
        }
      }
    });

    document.getElementById("customer-name").addEventListener("input", function () {
      this.style.borderColor = "#e0e0e0";
    });

    const params = new URLSearchParams(location.search);
    if (params.get("fail") === "1") {
      alert("결제가 취소되었거나 실패했습니다. 다시 시도해주세요.");
    }
  </script>
</body>
</html>
